<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trade Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --border2:   #21262d;
      --text:      #c9d1d9;
      --muted:     #8b949e;
      --accent:    #58a6ff;
      --bull:      #3fb950;
      --bear:      #f85149;
      --warn:      #d29922;
      --radius:    8px;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Top bar ── */
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    header h1 { font-size: 15px; font-weight: 700; color: var(--accent); white-space: nowrap; }
    header .sep { color: var(--border); }

    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #444; flex-shrink: 0;
    }
    .status-dot.ok  { background: var(--bull); }
    .status-dot.err { background: var(--bear); }

    #status-text { font-size: 11px; color: var(--muted); }

    /* ── Main split ── */
    main {
      display: flex;
      flex: 1;
      overflow: hidden;
      gap: 0;
    }

    /* ── Left: chart ── */
    #chart-col {
      flex: 13;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      overflow: hidden;
    }
    #chart-col iframe,
    #chart-col .tradingview-widget-container {
      flex: 1;
      width: 100%;
      height: 100%;
    }

    /* ── Right: panel ── */
    #panel-col {
      flex: 7;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Symbol bar at top of panel */
    #symbol-bar {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      flex-shrink: 0;
    }
    #symbol-bar label {
      font-size: 11px;
      color: var(--muted);
      display: block;
      margin-bottom: 5px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .sym-row { display: flex; gap: 6px; align-items: center; }
    #sym-input {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      padding: 6px 10px;
      outline: none;
      text-transform: uppercase;
    }
    #sym-input:focus { border-color: var(--accent); }

    .btn {
      padding: 6px 12px;
      border: none;
      border-radius: var(--radius);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
    }
    .btn-primary { background: var(--accent); color: #0d1117; }
    .btn-primary:hover { opacity: .85; }
    .btn-secondary { background: var(--surface); border: 1px solid var(--border); color: var(--text); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn:disabled { opacity: .45; cursor: default; }

    #broker-badge {
      font-size: 11px;
      font-weight: 700;
      padding: 3px 8px;
      border-radius: 4px;
      background: var(--border2);
      color: var(--accent);
      white-space: nowrap;
    }

    /* Mode toggles */
    .toggle-row {
      display: flex;
      gap: 6px;
      margin-top: 8px;
    }
    .toggle-btn {
      flex: 1;
      padding: 4px 6px;
      border: 1px solid var(--border);
      border-radius: 5px;
      background: var(--bg);
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      text-align: center;
    }
    .toggle-btn.active { border-color: var(--accent); color: var(--accent); background: #121c27; }

    /* Settings row */
    .settings-row {
      display: flex;
      gap: 8px;
      margin-top: 8px;
      align-items: center;
    }
    .settings-row label { font-size: 11px; color: var(--muted); }
    .settings-row select {
      flex: 1;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-size: 11px;
      padding: 3px 6px;
    }

    /* ── Summary scroll area ── */
    #summary-area {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      scrollbar-width: thin;
      scrollbar-color: var(--border2) transparent;
    }

    /* Cards */
    .card {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      padding: 10px 12px;
      margin-bottom: 8px;
    }
    .card-title {
      font-size: 11px;
      font-weight: 700;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: .05em;
      padding-bottom: 6px;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--border2);
    }
    .metric-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .metric-box {
      flex: 1;
      min-width: 60px;
      background: var(--bg);
      border: 1px solid var(--border2);
      border-radius: 5px;
      padding: 6px 8px;
      text-align: center;
    }
    .metric-label { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
    .metric-value { font-size: 13px; font-weight: 700; }
    .bull { color: var(--bull); }
    .bear { color: var(--bear); }
    .warn { color: var(--warn); }

    .levels-row { display: flex; gap: 6px; margin-bottom: 8px; }
    .level-item { flex: 1; }
    .level-label { font-size: 10px; color: var(--muted); margin-bottom: 2px; }
    .level-value { font-size: 13px; font-weight: 700; }

    .targets-list { list-style: none; margin-top: 6px; }
    .targets-list li { padding: 2px 0; font-size: 12px; display: flex; justify-content: space-between; }
    .targets-list li span { color: var(--bull); font-weight: 700; }

    .key-levels-grid { display: flex; flex-wrap: wrap; gap: 4px 10px; }
    .key-levels-grid .kl { font-size: 12px; }
    .key-levels-grid .kl em { color: var(--muted); font-style: normal; }

    .summary-text { font-size: 12px; color: var(--muted); line-height: 1.6; }

    .exec-row { display: flex; gap: 6px; margin-bottom: 8px; }

    .placeholder {
      text-align: center;
      color: var(--muted);
      font-size: 12px;
      padding: 40px 16px;
      line-height: 1.8;
    }
    .placeholder strong { color: var(--text); }

    /* token footer */
    #token-footer {
      padding: 5px 12px;
      font-size: 10px;
      color: var(--muted);
      border-top: 1px solid var(--border2);
      text-align: right;
      flex-shrink: 0;
    }

    /* spinner overlay on panel */
    .spinner-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(13,17,23,.7);
      align-items: center;
      justify-content: center;
      z-index: 10;
      border-radius: var(--radius);
    }
    .spinner-overlay.visible { display: flex; }
    .spinner {
      width: 28px; height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #panel-col { position: relative; }

    /* ── Timeframe bar (above chart) ── */
    #tf-bar {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 5px 10px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    #tf-bar span {
      font-size: 10px;
      color: var(--muted);
      margin-right: 4px;
      text-transform: uppercase;
      letter-spacing: .05em;
    }
    .tf-btn {
      padding: 3px 9px;
      border: 1px solid var(--border2);
      border-radius: 4px;
      background: var(--bg);
      color: var(--muted);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
    }
    .tf-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tf-btn.active { background: var(--accent); color: #0d1117; border-color: var(--accent); }
  </style>
</head>
<body>

<!-- ── Top bar ── -->
<header>
  <h1>📈 Trade Assistant</h1>
  <span class="sep">|</span>
  <div class="status-dot" id="status-dot"></div>
  <span id="status-text">connecting…</span>
</header>

<!-- ── Main ── -->
<main>

  <!-- Left: TradingView chart -->
  <div id="chart-col" style="display:flex;flex-direction:column;">
    <!-- Timeframe bar -->
    <div id="tf-bar">
      <span>TF</span>
      <button class="tf-btn" data-tf="1">1m</button>
      <button class="tf-btn" data-tf="3">3m</button>
      <button class="tf-btn active" data-tf="5">5m</button>
      <button class="tf-btn" data-tf="15">15m</button>
      <button class="tf-btn" data-tf="30">30m</button>
      <button class="tf-btn" data-tf="60">1h</button>
      <button class="tf-btn" data-tf="240">4h</button>
      <button class="tf-btn" data-tf="D">1D</button>
      <button class="tf-btn" data-tf="W">1W</button>
    </div>
    <div class="tradingview-widget-container" style="flex:1;width:100%">
      <div id="tv-widget" style="height:100%;width:100%"></div>
    </div>
  </div>

  <!-- Right: symbol + summary -->
  <div id="panel-col">

    <!-- Spinner overlay -->
    <div class="spinner-overlay" id="spinner">
      <div class="spinner"></div>
    </div>

    <!-- Symbol bar -->
    <div id="symbol-bar">
      <label>Symbol</label>
      <div class="sym-row">
        <input id="sym-input" type="text" value="BTCUSDT" placeholder="BTCUSDT / RELIANCE / NIFTY" />
        <span id="broker-badge">Delta</span>
      </div>
      <!-- Quick-select dropdown -->
      <select id="sym-select" style="width:100%;margin-top:6px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);color:var(--text);font-size:12px;padding:5px 8px;">
        <optgroup label="── Crypto (Delta) ──">
          <option value="BTCUSDT">BTC/USDT</option>
          <option value="ETHUSDT">ETH/USDT</option>
          <option value="SOLUSDT">SOL/USDT</option>
          <option value="BNBUSDT">BNB/USDT</option>
          <option value="XAUUSDT">XAU/USDT (Gold)</option>
          <option value="DOGEUSDT">DOGE/USDT</option>
          <option value="AVAXUSDT">AVAX/USDT</option>
        </optgroup>
        <optgroup label="── Indices (Fyers) ──">
          <option value="NIFTY50">NIFTY 50</option>
          <option value="BANKNIFTY">BANK NIFTY</option>
          <option value="SENSEX">SENSEX</option>
        </optgroup>
        <optgroup label="── NSE Equities ──">
          <option value="RELIANCE">RELIANCE</option>
          <option value="TCS">TCS</option>
          <option value="HDFCBANK">HDFC BANK</option>
          <option value="ICICIBANK">ICICI BANK</option>
          <option value="INFY">INFOSYS</option>
          <option value="SBIN">SBI</option>
          <option value="AXISBANK">AXIS BANK</option>
          <option value="BAJAJFINANCE">BAJAJ FINANCE</option>
          <option value="TATAMOTORS">TATA MOTORS</option>
          <option value="WIPRO">WIPRO</option>
          <option value="MARUTI">MARUTI</option>
          <option value="ONGC">ONGC</option>
          <option value="RBLBANK">RBL BANK</option>
        </optgroup>
      </select>
      <div class="sym-row" style="margin-top:6px">
        <button class="btn btn-primary" id="btn-analyse" style="flex:1">📊 Analyse</button>
        <button class="btn btn-secondary" id="btn-execute" style="flex:1">⚡ Execute</button>
      </div>
      <div class="toggle-row">
        <div class="toggle-btn active" id="mode-paper" data-mode="paper">Paper</div>
        <div class="toggle-btn" id="mode-real" data-mode="real">Real</div>
      </div>
      <div class="settings-row">
        <label>LLM</label>
        <select id="llm-select">
          <option value="openai">OpenAI</option>
          <option value="ollama">Ollama</option>
        </select>
      </div>
    </div>

    <!-- Summary scroll area -->
    <div id="summary-area">
      <div class="placeholder" id="placeholder">
        Enter a symbol above and click<br>
        <strong>Analyse</strong> to load the trade setup.
      </div>
    </div>

    <!-- Token footer -->
    <div id="token-footer">Tokens: —</div>
  </div>

</main>

<script>
const API = 'http://localhost:8100';
let sessionId  = null;
let tradeMode  = 'paper';
let totalTokens = 0;
let currentTf  = '5';   // default 5 min

// ── Symbol helpers ──────────────────────────────────────────────────────────
const DELTA_MAP = {
  BTC:'BTCUSDT', ETH:'ETHUSDT', SOL:'SOLUSDT', BNB:'BNBUSDT',
  XAU:'XAUUSDT', DOGE:'DOGEUSDT', AVAX:'AVAXUSDT', MATIC:'MATICUSDT',
  LINK:'LINKUSDT',
};
const DELTA_SYMS = new Set([...Object.keys(DELTA_MAP), ...Object.values(DELTA_MAP)]);
const NSE_TV = { NIFTY:'NSE:NIFTY', NIFTY50:'NSE:NIFTY', BANKNIFTY:'NSE:BANKNIFTY', SENSEX:'BSE:SENSEX' };

function detectBroker(raw) {
  const s = raw.toUpperCase().replace(/\.P$/, '');
  if (DELTA_SYMS.has(s) || s.endsWith('USDT') || s.endsWith('PERP')) return 'delta';
  if (DELTA_MAP[s]) return 'delta';
  return 'fyers';
}

function toTVSymbol(raw) {
  const s = raw.toUpperCase().replace(/\.P$/, '');
  if (NSE_TV[s])      return NSE_TV[s];
  if (DELTA_MAP[s])   return `BINANCE:${DELTA_MAP[s]}`;
  if (s.endsWith('USDT')) return `BINANCE:${s}`;
  return `NSE:${s}`;
}

function toBackendSymbol(raw) {
  const s = raw.toUpperCase().replace(/\.P$/, '');
  return DELTA_MAP[s] || s;
}

// ── TradingView widget ──────────────────────────────────────────────────────
// Use the widget JS API (not the embed script) so the iframe is created ONCE.
// Changing symbol/interval calls widget.setSymbol() — drawings are preserved.
let tvWidget = null;
let tvLibLoaded = false;

function loadTVLib(cb) {
  if (tvLibLoaded) { cb(); return; }
  const s = document.createElement('script');
  s.src = 'https://s3.tradingview.com/tv.js';
  s.onload = () => { tvLibLoaded = true; cb(); };
  document.head.appendChild(s);
}

function initChart(tvSym) {
  loadTVLib(() => {
    tvWidget = new TradingView.widget({
      container_id: 'tv-widget',
      autosize: true,
      symbol: tvSym,
      interval: currentTf,
      timezone: 'Asia/Kolkata',
      theme: 'dark',
      style: '1',
      locale: 'in',
      withdateranges: true,
      hide_side_toolbar: false,
      allow_symbol_change: true,
      support_host: 'https://www.tradingview.com',
    });
  });
}

function updateChart(tvSym) {
  if (!tvWidget || !tvWidget.iframe) {
    // Widget not ready yet — (re)init
    initChart(tvSym);
    return;
  }
  // Use the widget API to update symbol + interval without destroying the iframe
  tvWidget.onChartReady(() => {
    tvWidget.activeChart().setSymbol(tvSym, () => {
      tvWidget.activeChart().setResolution(currentTf);
    });
  });
}

// ── Backend health + session init ──────────────────────────────────────────
async function initSession() {
  try {
    const h = await fetch(`${API}/health`);
    if (!h.ok) throw new Error(`HTTP ${h.status}`);
    const dot  = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    dot.classList.add('ok');
    text.textContent = 'Backend connected';
  } catch (e) {
    const dot  = document.getElementById('status-dot');
    const text = document.getElementById('status-text');
    dot.classList.add('err');
    text.textContent = `Backend offline — ${e.message}`;
  }

  // Create a session (no auth needed)
  try {
    const r = await fetch(`${API}/sessions/new`, { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' });
    if (r.ok) {
      const d = await r.json();
      sessionId = d.session_id;
    }
  } catch (_) {}
}

// ── Symbol input → broker badge live update ──────────────────────────────
const symInput    = document.getElementById('sym-input');
const brokerBadge = document.getElementById('broker-badge');

symInput.addEventListener('input', () => {
  const broker = detectBroker(symInput.value || 'BTCUSDT');
  if (broker === 'delta') {
    brokerBadge.textContent = 'Delta';
    brokerBadge.style.color = '#60a5fa';
  } else {
    brokerBadge.textContent = 'Fyers (NSE)';
    brokerBadge.style.color = '#34d399';
  }
});

symInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('btn-analyse').click();
});

// ── Timeframe buttons ────────────────────────────────────────────────────
document.querySelectorAll('.tf-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTf = btn.dataset.tf;
    updateChart(toTVSymbol(document.getElementById('sym-input').value || 'BTCUSDT'));
  });
});

// ── Symbol dropdown ───────────────────────────────────────────────────────
document.getElementById('sym-select').addEventListener('change', function() {
  const val = this.value;
  symInput.value = val;
  // Update broker badge
  const broker = detectBroker(val);
  brokerBadge.textContent = broker === 'delta' ? 'Delta' : 'Fyers (NSE)';
  brokerBadge.style.color = broker === 'delta' ? '#60a5fa' : '#34d399';
  // Update chart immediately
  updateChart(toTVSymbol(val));
});

// ── Trade mode toggles ───────────────────────────────────────────────────
document.querySelectorAll('.toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    tradeMode = btn.dataset.mode;
  });
});

// ── Analyse / Execute ─────────────────────────────────────────────────────
document.getElementById('btn-analyse').addEventListener('click', () => runAction('analyse'));
document.getElementById('btn-execute').addEventListener('click', () => runAction('execute'));

async function runAction(type) {
  const raw    = symInput.value.trim() || 'BTCUSDT';
  const sym    = toBackendSymbol(raw);
  const tvSym  = toTVSymbol(raw);
  const llm    = document.getElementById('llm-select').value;
  const intent = type === 'analyse' ? 'Analyse' : 'Execute trade on';
  const msg    = `${intent} ${sym} for intraday trade`;

  // Update chart for new symbol (preserves drawings)
  updateChart(tvSym);

  // Disable buttons + show spinner
  setLoading(true);

  try {
    const body = {
      message:      msg,
      session_id:   sessionId || 'default',
      llm_provider: llm,
      trade_mode:   tradeMode,
    };

    const r = await fetch(`${API}/chat`, {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify(body),
    });

    const data = r.ok ? await r.json() : null;
    if (data) {
      totalTokens += data.tokens_used || 0;
      document.getElementById('token-footer').textContent =
        `Session: ${data.session_tokens || totalTokens} tokens`;
      renderSummary(data.analysis || {}, data.execution || {}, raw.toUpperCase());
    } else {
      renderError(`HTTP ${r.status}`);
    }
  } catch (e) {
    renderError(e.message);
  } finally {
    setLoading(false);
  }
}

function setLoading(on) {
  document.getElementById('spinner').classList.toggle('visible', on);
  document.getElementById('btn-analyse').disabled = on;
  document.getElementById('btn-execute').disabled = on;
}

// ── Render summary cards ──────────────────────────────────────────────────
function renderError(msg) {
  document.getElementById('summary-area').innerHTML =
    `<div class="placeholder" style="color:var(--bear)">❌ Error: ${esc(msg)}</div>`;
}

function renderSummary(a, e, displaySym) {
  const area = document.getElementById('summary-area');
  area.innerHTML = '';

  if (!a || !Object.keys(a).length) {
    area.innerHTML = `<div class="placeholder">No analysis data returned.<br>Check the backend logs.</div>`;
    return;
  }

  const trend    = (a.trend || '—').toUpperCase();
  const tClass   = /BULL|UP/.test(trend) ? 'bull' : /BEAR|DOWN/.test(trend) ? 'bear' : 'warn';
  const tIcon    = tClass === 'bull' ? '↑' : tClass === 'bear' ? '↓' : '→';

  // Card 1 — overview
  area.appendChild(card('📊 Trade Setup — ' + (a.symbol || displaySym), `
    <div class="metric-grid">
      ${metricBox('Trend',      `<span class="${tClass}">${trend} ${tIcon}</span>`)}
      ${metricBox('Strength',   esc(a.strength || '—'))}
      ${metricBox('Price',      esc(a.last_price || '—'))}
      ${metricBox('Confidence', esc(a.confidence || '—'))}
    </div>
  `));

  // Card 2 — levels
  const targets = Array.isArray(a.targets) ? a.targets : [];
  const tItems  = targets.map((t,i) =>
    `<li>T${i+1} <span>${esc(String(t))}</span></li>`).join('') || '<li>—</li>';

  area.appendChild(card('🎯 Levels', `
    <div class="levels-row">
      <div class="level-item">
        <div class="level-label">ENTRY ZONE</div>
        <div class="level-value warn">${esc(String(a.entry_zone || '—'))}</div>
      </div>
      <div class="level-item">
        <div class="level-label">STOP LOSS</div>
        <div class="level-value bear">${esc(String(a.stop_loss || '—'))}</div>
      </div>
      <div class="level-item">
        <div class="level-label">R:R</div>
        <div class="level-value bull">${esc(String(a.rr_ratio || '—'))}</div>
      </div>
    </div>
    <div class="level-label" style="margin-bottom:4px">TARGETS</div>
    <ul class="targets-list">${tItems}</ul>
  `));

  // Card 3 — key levels (optional)
  const kl = a.key_levels;
  if (kl && typeof kl === 'object' && Object.keys(kl).length) {
    const klHtml = Object.entries(kl)
      .map(([k,v]) => `<div class="kl"><em>${esc(k)}:</em> <strong>${esc(String(v))}</strong></div>`)
      .join('');
    area.appendChild(card('📐 Key Levels', `<div class="key-levels-grid">${klHtml}</div>`));
  }

  // Card 4 — summary text
  if (a.summary) {
    area.appendChild(card('💬 Analysis', `<div class="summary-text">${esc(a.summary)}</div>`));
  }

  // Card 5 — execution (if present)
  if (e && Object.keys(e).length) {
    const action = (e.action || '—').toUpperCase();
    const aClass = /BUY|LONG/.test(action) ? 'bull' : 'bear';
    const mode   = (e.mode || 'paper').toUpperCase();
    const mColor = mode === 'REAL' ? 'var(--bear)' : 'var(--bull)';
    area.appendChild(card('⚡ Execution Plan', `
      <div class="metric-grid" style="margin-bottom:8px">
        ${metricBox('Action',     `<span class="${aClass}">${esc(action)}</span>`)}
        ${metricBox('Qty',        esc(String(e.qty || '—')))}
        ${metricBox('Order',      esc(e.order_type || '—'))}
        ${metricBox('Mode',       `<span style="color:${mColor}">${esc(mode)}</span>`)}
      </div>
      ${e.rationale ? `<div class="summary-text">${esc(e.rationale)}</div>` : ''}
    `));
  }
}

// ── DOM helpers ───────────────────────────────────────────────────────────
function card(title, bodyHtml) {
  const d = document.createElement('div');
  d.className = 'card';
  d.innerHTML = `<div class="card-title">${esc(title)}</div>${bodyHtml}`;
  return d;
}

function metricBox(label, valueHtml) {
  return `<div class="metric-box">
    <div class="metric-label">${esc(label)}</div>
    <div class="metric-value">${valueHtml}</div>
  </div>`;
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── Boot ──────────────────────────────────────────────────────────────────
initSession();
initChart(toTVSymbol(symInput.value));
</script>
