<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trade Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --surface:  #161b22;
      --border:   #30363d;
      --border2:  #21262d;
      --text:     #c9d1d9;
      --muted:    #8b949e;
      --accent:   #58a6ff;
      --bull:     #3fb950;
      --bear:     #f85149;
      --warn:     #d29922;
      --radius:   8px;
      --panel-w:  320px;
    }

    html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; font-size: 13px; }

    #shell { display: flex; flex-direction: column; height: 100%; }

    /* ── Header ── */
    header {
      display: flex; align-items: center; gap: 10px;
      padding: 5px 14px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0; z-index: 20;
    }
    header h1 { font-size: 14px; font-weight: 800; color: var(--accent); white-space: nowrap; }
    .sep { color: var(--border); }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #444; flex-shrink: 0; }
    .status-dot.ok  { background: var(--bull); box-shadow: 0 0 4px var(--bull); }
    .status-dot.err { background: var(--bear); }
    #status-text { font-size: 11px; color: var(--muted); }
    .spacer { flex: 1; }
    #btn-toggle-panel {
      display: flex; align-items: center; gap: 5px;
      padding: 4px 10px; border: 1px solid var(--border);
      border-radius: 5px; background: var(--bg); color: var(--muted);
      font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap;
    }
    #btn-toggle-panel:hover { color: var(--accent); border-color: var(--accent); }

    /* ── Workspace ── */
    #workspace { display: flex; flex: 1; overflow: hidden; }

    /* ── Chart column ── */
    #chart-col { flex: 1; display: flex; flex-direction: column; min-width: 0; }

    #tf-bar {
      display: flex; align-items: center; gap: 3px;
      padding: 4px 10px;
      background: var(--surface); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tf-label { font-size: 10px; color: var(--muted); text-transform: uppercase;
      letter-spacing: .06em; margin-right: 4px; }
    .tf-btn {
      padding: 2px 8px; border: 1px solid var(--border2); border-radius: 4px;
      background: var(--bg); color: var(--muted); font-size: 11px; font-weight: 600; cursor: pointer;
    }
    .tf-btn:hover { border-color: var(--accent); color: var(--accent); }
    .tf-btn.active { background: var(--accent); color: #0d1117; border-color: var(--accent); }

    #tv-frame {
      flex: 1; width: 100%; border: none;
      display: block;
    }

    /* TV widget container must fill all remaining height */
    #tv-container {
      flex: 1;
      min-height: 0;
      width: 100%;
      position: relative;
    }
    #tv-widget {
      width: 100%;
      height: 100%;
    }

    /* ── Right panel ── */
    #panel-col {
      width: var(--panel-w); flex-shrink: 0;
      display: flex; flex-direction: column;
      border-left: 1px solid var(--border);
      overflow: hidden; position: relative;
      transition: width .25s ease, opacity .2s ease;
    }
    #panel-col.hidden { width: 0; opacity: 0; border-left: none; pointer-events: none; }

    /* ── Symbol bar ── */
    #symbol-bar {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--surface); flex-shrink: 0;
    }
    .bar-label { font-size: 10px; color: var(--muted); text-transform: uppercase;
      letter-spacing: .06em; margin-bottom: 5px; }

    #sym-select {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--text); font-size: 12px;
      padding: 6px 8px; margin-bottom: 6px; cursor: pointer;
    }
    #sym-select:focus { border-color: var(--accent); outline: none; }

    .sym-display-row {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--border2); border-radius: var(--radius);
      padding: 5px 10px; margin-bottom: 6px;
    }
    #sym-display { font-size: 14px; font-weight: 800; color: var(--text); letter-spacing: .04em; }
    #broker-badge {
      font-size: 10px; font-weight: 700; padding: 3px 7px;
      border-radius: 4px; background: var(--bg); color: var(--accent); white-space: nowrap;
    }

    .action-row { display: flex; gap: 5px; margin-bottom: 6px; }
    .btn {
      padding: 6px 10px; border: none; border-radius: var(--radius);
      font-size: 12px; font-weight: 600; cursor: pointer; flex: 1;
    }
    .btn-primary  { background: var(--accent); color: #0d1117; }
    .btn-primary:hover  { opacity: .85; }
    .btn-secondary { background: var(--bg); border: 1px solid var(--border); color: var(--text); }
    .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
    .btn:disabled { opacity: .4; cursor: default; }

    .toggle-row { display: flex; gap: 5px; margin-bottom: 6px; }
    .toggle-btn {
      flex: 1; padding: 4px; border: 1px solid var(--border); border-radius: 5px;
      background: var(--bg); color: var(--muted); font-size: 11px; cursor: pointer; text-align: center;
    }
    .toggle-btn.active { border-color: var(--accent); color: var(--accent); background: #0f1c2e; }

    .settings-row { display: flex; align-items: center; gap: 6px; }
    .settings-row label { font-size: 11px; color: var(--muted); white-space: nowrap; }
    .settings-row select {
      flex: 1; background: var(--bg); border: 1px solid var(--border);
      border-radius: 5px; color: var(--text); font-size: 11px; padding: 3px 6px;
    }

    /* ── Summary ── */
    #summary-area {
      flex: 1; overflow-y: auto; padding: 10px 12px;
      scrollbar-width: thin; scrollbar-color: var(--border2) transparent;
    }
    .card { background: var(--surface); border: 1px solid var(--border2);
      border-radius: var(--radius); padding: 10px 12px; margin-bottom: 8px; }
    .card-title { font-size: 10px; font-weight: 700; color: var(--accent);
      text-transform: uppercase; letter-spacing: .05em;
      padding-bottom: 5px; margin-bottom: 7px; border-bottom: 1px solid var(--border2); }
    .metric-grid { display: flex; flex-wrap: wrap; gap: 5px; }
    .metric-box { flex: 1; min-width: 55px; background: var(--bg); border: 1px solid var(--border2);
      border-radius: 5px; padding: 5px 7px; text-align: center; }
    .metric-label { font-size: 9px; color: var(--muted); margin-bottom: 2px; }
    .metric-value { font-size: 12px; font-weight: 700; }
    .bull { color: var(--bull); } .bear { color: var(--bear); } .warn { color: var(--warn); }
    .levels-row { display: flex; gap: 5px; margin-bottom: 7px; }
    .level-item { flex: 1; }
    .level-label { font-size: 9px; color: var(--muted); margin-bottom: 2px; }
    .level-value { font-size: 12px; font-weight: 700; }
    .targets-list { list-style: none; margin-top: 5px; }
    .targets-list li { padding: 2px 0; font-size: 11px; display: flex; justify-content: space-between; }
    .targets-list li span { color: var(--bull); font-weight: 700; }
    .kl-grid { display: flex; flex-wrap: wrap; gap: 4px 10px; }
    .kl-grid .kl { font-size: 11px; }
    .kl-grid .kl em { color: var(--muted); font-style: normal; }
    .summary-text { font-size: 11px; color: var(--muted); line-height: 1.6; }
    .placeholder { text-align: center; color: var(--muted); font-size: 12px;
      padding: 36px 12px; line-height: 1.9; }
    .placeholder strong { color: var(--text); }

    #token-footer { padding: 4px 12px; font-size: 10px; color: var(--muted);
      border-top: 1px solid var(--border2); text-align: right; flex-shrink: 0; }

    /* Spinner */
    .spinner-overlay { display: none; position: absolute; inset: 0;
      background: rgba(13,17,23,.75); align-items: center; justify-content: center; z-index: 30; }
    .spinner-overlay.visible { display: flex; }
    .spinner { width: 26px; height: 26px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div id="shell">

  <header>
    <h1>📈 Trade Assistant</h1>
    <span class="sep">|</span>
    <div class="status-dot" id="status-dot"></div>
    <span id="status-text">connecting…</span>
    <div class="spacer"></div>
    <button id="btn-toggle-panel">
      <span id="toggle-arrow">▶</span>
      <span id="toggle-label">Hide Panel</span>
    </button>
  </header>

  <div id="workspace">

    <!-- Chart: TradingView widget (official embed — drawings sync to TV account) -->
    <div id="chart-col">
      <div id="tf-bar">
        <span class="tf-label">TF</span>
        <button class="tf-btn" data-tf="1">1m</button>
        <button class="tf-btn" data-tf="3">3m</button>
        <button class="tf-btn active" data-tf="5">5m</button>
        <button class="tf-btn" data-tf="15">15m</button>
        <button class="tf-btn" data-tf="30">30m</button>
        <button class="tf-btn" data-tf="60">1h</button>
        <button class="tf-btn" data-tf="240">4h</button>
        <button class="tf-btn" data-tf="D">1D</button>
        <button class="tf-btn" data-tf="W">1W</button>
      </div>
      <div id="tv-container">
        <div id="tv-widget"></div>
      </div>
    </div>

    <!-- Right panel -->
    <div id="panel-col">
      <div class="spinner-overlay" id="spinner"><div class="spinner"></div></div>

      <div id="symbol-bar">
        <div class="bar-label">Symbol</div>

        <select id="sym-select">
          <optgroup label="── Crypto (Delta) ──">
            <option value="BTCUSDT" selected>BTC/USD — Bitcoin</option>
            <option value="ETHUSDT">ETH/USD — Ethereum</option>
            <option value="SOLUSDT">SOL/USD — Solana</option>
            <option value="BNBUSDT">BNB/USD — BNB</option>
            <option value="XAUUSDT">XAU/USD — Gold</option>
            <option value="DOGEUSDT">DOGE/USD — Dogecoin</option>
            <option value="AVAXUSDT">AVAX/USD — Avalanche</option>
            <option value="LINKUSDT">LINK/USD — Chainlink</option>
            <option value="MATICUSDT">MATIC/USD — Polygon</option>
            <option value="ADAUSDT">ADA/USD — Cardano</option>
            <option value="DOTUSDT">DOT/USD — Polkadot</option>
            <option value="XRPUSDT">XRP/USD — Ripple</option>
            <option value="LTCUSDT">LTC/USD — Litecoin</option>
          </optgroup>
          <optgroup label="── Indices (Fyers) ──">
            <option value="NIFTY50">NIFTY 50</option>
            <option value="BANKNIFTY">BANK NIFTY</option>
            <option value="SENSEX">SENSEX</option>
            <option value="MIDCPNIFTY">MIDCAP NIFTY</option>
            <option value="FINNIFTY">FIN NIFTY</option>
          </optgroup>
          <optgroup label="── Banking ──">
            <option value="HDFCBANK">HDFC BANK</option>
            <option value="ICICIBANK">ICICI BANK</option>
            <option value="SBIN">SBI</option>
            <option value="AXISBANK">AXIS BANK</option>
            <option value="KOTAKBANK">KOTAK BANK</option>
            <option value="INDUSINDBK">INDUSIND BANK</option>
            <option value="RBLBANK">RBL BANK</option>
            <option value="CANBK">CANARA BANK</option>
            <option value="PNB">PNB</option>
            <option value="BANKBARODA">BANK OF BARODA</option>
          </optgroup>
          <optgroup label="── IT / Tech ──">
            <option value="TCS">TCS</option>
            <option value="INFY">INFOSYS</option>
            <option value="WIPRO">WIPRO</option>
            <option value="HCLTECH">HCL TECH</option>
            <option value="TECHM">TECH MAHINDRA</option>
            <option value="LTIM">LTI MINDTREE</option>
          </optgroup>
          <optgroup label="── Large Cap ──">
            <option value="RELIANCE">RELIANCE</option>
            <option value="BAJAJFINANCE">BAJAJ FINANCE</option>

            <option value="MARUTI">MARUTI</option>
            <option value="ONGC">ONGC</option>
            <option value="NTPC">NTPC</option>
            <option value="LT">L&amp;T</option>
            <option value="SUNPHARMA">SUN PHARMA</option>
            <option value="ADANIPORTS">ADANI PORTS</option>
            <option value="ASIANPAINT">ASIAN PAINTS</option>
            <option value="TITAN">TITAN</option>
            <option value="HINDALCO">HINDALCO</option>
            <option value="JSWSTEEL">JSW STEEL</option>
            <option value="TATASTEEL">TATA STEEL</option>
          </optgroup>
        </select>

        <div class="sym-display-row">
          <span id="sym-display">BTCUSDT</span>
          <span id="broker-badge">Delta</span>
        </div>

        <div class="action-row">
          <button class="btn btn-primary"   id="btn-analyse">📊 Analyse</button>
          <button class="btn btn-secondary" id="btn-execute">⚡ Execute</button>
        </div>

        <div class="toggle-row">
          <div class="toggle-btn active" data-mode="paper">Paper</div>
          <div class="toggle-btn"        data-mode="real">Real</div>
        </div>

        <div class="settings-row">
          <label>LLM</label>
          <select id="llm-select">
            <option value="openai">OpenAI</option>

        </div>
      </div>

      <div id="summary-area">
        <div class="placeholder">
          Select a symbol and click<br><strong>Analyse</strong> to load the trade setup.
        </div>
      </div>

      <div id="token-footer">Tokens: —</div>
    </div>

  </div>
</div>

<script>
/* ═══════════════════════════════════════════════════
   State
═══════════════════════════════════════════════════ */
const API = 'http://localhost:8100';
let sessionId    = null;
let tradeMode    = 'paper';
let totalTokens  = 0;
let currentTf    = '5';
let panelVisible = true;
let currentSym   = 'BTCUSDT';

/* ═══════════════════════════════════════════════════
   Symbol helpers
═══════════════════════════════════════════════════ */
const DELTA_MAP = {
  BTC:'BTCUSD', ETH:'ETHUSD', SOL:'SOLUSD', BNB:'BNBUSD',
  XAU:'XAUUSD', DOGE:'DOGEUSD', AVAX:'AVAXUSD',
  MATIC:'MATICUSD', LINK:'LINKUSD',
  // USDT variants also map to Delta perpetuals
  BTCUSDT:'BTCUSD', ETHUSDT:'ETHUSD', SOLUSDT:'SOLUSD',
  BNBUSDT:'BNBUSD', XAUUSDT:'XAUUSD', DOGEUSDT:'DOGEUSD',
  AVAXUSDT:'AVAXUSD', MATICUSDT:'MATICUSD', LINKUSDT:'LINKUSD',
};
const DELTA_SYMS = new Set([...Object.keys(DELTA_MAP), ...Object.values(DELTA_MAP)]);
const NSE_TV = {
  NIFTY:'NSE:NIFTY', NIFTY50:'NSE:NIFTY',
  BANKNIFTY:'NSE:BANKNIFTY', SENSEX:'BSE:SENSEX',
  MIDCPNIFTY:'NSE:MIDCPNIFTY', FINNIFTY:'NSE:FINNIFTY',
};

function detectBroker(s) {
  s = s.toUpperCase().replace(/\.P$/, '');
  if (DELTA_SYMS.has(s) || s.endsWith('USDT') || s.endsWith('PERP')) return 'delta';
  return 'fyers';
}

function toTVSymbol(s) {
  s = s.toUpperCase().replace(/\.P$/, '');
  if (NSE_TV[s])    return NSE_TV[s];
  // Delta perpetuals: DELTA:BTCUSD.P
  const deltaBase = DELTA_MAP[s];
  if (deltaBase)    return 'DELTA:' + deltaBase + '.P';
  // bare USDT suffix typed directly
  if (s.endsWith('USDT')) return 'DELTA:' + s.replace(/USDT$/, 'USD') + '.P';
  if (s.endsWith('USD'))  return 'DELTA:' + s + '.P';
  return 'NSE:' + s;
}

function toBackendSymbol(s) {
  s = s.toUpperCase().replace(/\.P$/, '');
  return DELTA_MAP[s] || s;
}

/* ═══════════════════════════════════════════════════
   Apply symbol — updates state, badge, display, chart
═══════════════════════════════════════════════════ */
const symDisplay  = document.getElementById('sym-display');
const brokerBadge = document.getElementById('broker-badge');
const tvFrame     = document.getElementById('tv-frame');

function applySymbol(raw) {
  currentSym = raw.toUpperCase().replace(/\.P$/, '');
  const broker = detectBroker(currentSym);
  symDisplay.textContent   = currentSym;
  brokerBadge.textContent  = broker === 'delta' ? 'Delta' : 'Fyers NSE';
  brokerBadge.style.color  = broker === 'delta' ? '#60a5fa' : '#34d399';
  updateChart(toTVSymbol(currentSym));
}

/* ═══════════════════════════════════════════════════
   TradingView widget
   - tv.js loaded once, widget recreated on sym/TF change
   - setSymbol/setResolution are Charting Library (paid) only
   - load_last_chart restores drawings from TV cloud on each init
═══════════════════════════════════════════════════ */
let tvLibLoaded = false;

function loadTVLib(cb) {
  if (tvLibLoaded) { cb(); return; }
  const s = document.createElement('script');
  s.src = 'https://s3.tradingview.com/tv.js';
  s.onload = () => { tvLibLoaded = true; cb(); };
  document.head.appendChild(s);
}

function buildWidget(tvSym) {
  // Clear container before creating a new widget instance
  document.getElementById('tv-widget').innerHTML = '';

  loadTVLib(() => {
    new TradingView.widget({
      container_id:      'tv-widget',
      autosize:          true,
      symbol:            tvSym,
      interval:          currentTf,

      /* appearance */
      timezone:          'Asia/Kolkata',
      theme:             'dark',
      style:             '1',
      locale:            'in',
      toolbar_bg:        '#161b22',
      withdateranges:    true,
      hide_top_toolbar:  false,
      hide_side_toolbar: false,
      hide_legend:       false,
      allow_symbol_change: true,
      save_image:        true,

      /* drawings & layout saved to TV account cloud */
      charts_storage_url:         'https://saveload.tradingview.com',
      charts_storage_api_version: '1.1',
      client_id:                  'tradingview.com',
      user_id:                    'public_user_id',
      load_last_chart:             true,

      enabled_features: [
        'study_templates',
        'use_localstorage_for_settings',
        'save_chart_properties_to_local_storage',
        'create_volume_indicator_by_default',
        'header_saveload',
        'header_screenshot',
        'header_undo_redo',
        'show_chart_property_page',
        'side_toolbar_in_fullscreen_mode',
      ],
      disabled_features: [],
      support_host: 'https://www.tradingview.com',
    });
  });
}

function updateChart(tvSym) {
  buildWidget(tvSym);
}

/* ═══════════════════════════════════════════════════
   TF buttons — rebuild widget with new interval
═══════════════════════════════════════════════════ */
document.querySelectorAll('.tf-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tf-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentTf = btn.dataset.tf;
    buildWidget(toTVSymbol(currentSym));
  });
});

/* ═══════════════════════════════════════════════════
   Symbol dropdown
═══════════════════════════════════════════════════ */
document.getElementById('sym-select').addEventListener('change', function () {
  applySymbol(this.value);
});

/* ═══════════════════════════════════════════════════
   Panel toggle
═══════════════════════════════════════════════════ */
document.getElementById('btn-toggle-panel').addEventListener('click', () => {
  panelVisible = !panelVisible;
  document.getElementById('panel-col').classList.toggle('hidden', !panelVisible);
  document.getElementById('toggle-arrow').textContent = panelVisible ? '▶' : '◀';
  document.getElementById('toggle-label').textContent = panelVisible ? 'Hide Panel' : 'Show Panel';
});

/* ═══════════════════════════════════════════════════
   Trade mode
═══════════════════════════════════════════════════ */
document.querySelectorAll('.toggle-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    tradeMode = btn.dataset.mode;
  });
});

/* ═══════════════════════════════════════════════════
   Backend init
═══════════════════════════════════════════════════ */
async function initSession() {
  try {
    const r = await fetch(API + '/health');
    if (!r.ok) throw new Error('HTTP ' + r.status);
    document.getElementById('status-dot').classList.add('ok');
    document.getElementById('status-text').textContent = 'Backend connected';
  } catch (e) {
    document.getElementById('status-dot').classList.add('err');
    document.getElementById('status-text').textContent = 'Offline — ' + e.message;
  }
  try {
    const r = await fetch(API + '/sessions/new',
      { method:'POST', headers:{'Content-Type':'application/json'}, body:'{}' });
    if (r.ok) sessionId = (await r.json()).session_id;
  } catch (_) {}
}

/* ═══════════════════════════════════════════════════
   Analyse / Execute
═══════════════════════════════════════════════════ */
document.getElementById('btn-analyse').addEventListener('click', () => runAction('analyse'));
document.getElementById('btn-execute').addEventListener('click', () => runAction('execute'));

async function runAction(type) {
  const sym = toBackendSymbol(currentSym);
  const llm = document.getElementById('llm-select').value;
  const msg = (type === 'analyse' ? 'Analyse ' : 'Execute trade on ') + sym + ' for intraday trade';

  setLoading(true);
  try {
    const r = await fetch(API + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message:      msg,
        session_id:   sessionId || 'default',
        llm_provider: llm,
        trade_mode:   tradeMode,
      }),
    });
    const data = r.ok ? await r.json() : null;
    if (data) {
      totalTokens += data.tokens_used || 0;
      document.getElementById('token-footer').textContent =
        'Session: ' + (data.session_tokens || totalTokens) + ' tokens';
      renderSummary(data.analysis || {}, data.execution || {}, currentSym);
    } else {
      renderError('HTTP ' + r.status);
    }
  } catch (e) {
    renderError(e.message);
  } finally {
    setLoading(false);
  }
}

function setLoading(on) {
  document.getElementById('spinner').classList.toggle('visible', on);
  document.getElementById('btn-analyse').disabled = on;
  document.getElementById('btn-execute').disabled = on;
}

/* ═══════════════════════════════════════════════════
   Summary cards
═══════════════════════════════════════════════════ */
function renderError(msg) {
  document.getElementById('summary-area').innerHTML =
    '<div class="placeholder" style="color:var(--bear)">❌ ' + esc(msg) + '</div>';
}

function renderSummary(a, e, sym) {
  const area = document.getElementById('summary-area');
  area.innerHTML = '';
  if (!a || !Object.keys(a).length) {
    area.innerHTML = '<div class="placeholder">No analysis returned.<br>Check backend logs.</div>';
    return;
  }

  const trend = (a.trend || '—').toUpperCase();
  const tCls  = /BULL|UP/.test(trend) ? 'bull' : /BEAR|DOWN/.test(trend) ? 'bear' : 'warn';
  const tIcon = tCls === 'bull' ? '↑' : tCls === 'bear' ? '↓' : '→';

  area.appendChild(card('📊 Setup — ' + (a.symbol || sym), `
    <div class="metric-grid">
      ${mb('Trend',    '<span class="' + tCls + '">' + trend + ' ' + tIcon + '</span>')}
      ${mb('Strength', esc(a.strength   || '—'))}
      ${mb('Price',    esc(a.last_price || '—'))}
      ${mb('Conf',     esc(a.confidence || '—'))}
    </div>`));

  const targets = Array.isArray(a.targets) ? a.targets : [];
  area.appendChild(card('🎯 Levels', `
    <div class="levels-row">
      <div class="level-item">
        <div class="level-label">ENTRY</div>
        <div class="level-value warn">${esc(String(a.entry_zone || '—'))}</div>
      </div>
      <div class="level-item">
        <div class="level-label">STOP LOSS</div>
        <div class="level-value bear">${esc(String(a.stop_loss || '—'))}</div>
      </div>
      <div class="level-item">
        <div class="level-label">R:R</div>
        <div class="level-value bull">${esc(String(a.rr_ratio || '—'))}</div>
      </div>
    </div>
    <div class="level-label" style="margin-bottom:3px">TARGETS</div>
    <ul class="targets-list">
      ${targets.map((t,i) => '<li>T'+(i+1)+' <span>'+esc(String(t))+'</span></li>').join('') || '<li>—</li>'}
    </ul>`));

  const kl = a.key_levels;
  if (kl && typeof kl === 'object' && Object.keys(kl).length) {
    area.appendChild(card('📐 Key Levels',
      '<div class="kl-grid">' +
      Object.entries(kl).map(([k,v]) =>
        '<div class="kl"><em>'+esc(k)+':</em> <strong>'+esc(String(v))+'</strong></div>'
      ).join('') + '</div>'));
  }

  if (a.summary)
    area.appendChild(card('💬 Analysis', '<div class="summary-text">'+esc(a.summary)+'</div>'));

  if (e && Object.keys(e).length) {
    const action = (e.action || '—').toUpperCase();
    const aCls   = /BUY|LONG/.test(action) ? 'bull' : 'bear';
    const mode   = (e.mode || 'paper').toUpperCase();
    area.appendChild(card('⚡ Execution', `
      <div class="metric-grid" style="margin-bottom:7px">
        ${mb('Action', '<span class="'+aCls+'">'+esc(action)+'</span>')}
        ${mb('Qty',    esc(String(e.qty || '—')))}
        ${mb('Order',  esc(e.order_type || '—'))}
        ${mb('Mode',   '<span style="color:'+(mode==='REAL'?'var(--bear)':'var(--bull)')+'">'+esc(mode)+'</span>')}
      </div>
      ${e.rationale ? '<div class="summary-text">'+esc(e.rationale)+'</div>' : ''}`));
  }
}

function card(title, body) {
  const d = document.createElement('div');
  d.className = 'card';
  d.innerHTML = '<div class="card-title">'+esc(title)+'</div>'+body;
  return d;
}
function mb(label, valueHtml) {
  return '<div class="metric-box"><div class="metric-label">'+esc(label)+'</div><div class="metric-value">'+valueHtml+'</div></div>';
}
function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ═══════════════════════════════════════════════════
   Boot
═══════════════════════════════════════════════════ */
initSession();
applySymbol('BTCUSDT');
</script>
